<style>
  :root{
    --red: #c22a2f;
    --red-dark: #9c2024;
    --ink: #12140f;
    --paper: #f3efe4;
    --night-1: #0c1410;
    --night-2: #05070a;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    height: 100%;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    min-height: 100vh;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(255,255,255,0.05), transparent 60%),
      linear-gradient(180deg, var(--night-1) 0%, var(--night-2) 70%);
    color: white;
    display: flex;
    justify-content: center;
    padding: env(safe-area-inset-top, 24px) 20px calc(env(safe-area-inset-bottom, 24px) + 12px);
  }

  .app{
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
  }

  h1.title{
    font-size: 2.15rem;
    line-height: 1.08;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.01em;
    margin: 12px 0 22px;
    text-shadow: 0 2px 18px rgba(0,0,0,0.6);
  }

  /* --- poster / signature element --- */
  .poster-wrap{
    width: 100%;
    position: relative;
    margin-bottom: 26px;
  }

  .poster{
    width: 100%;
    aspect-ratio: 4 / 3;
    max-height: 300px;
    border-radius: 18px;
    background: linear-gradient(160deg, #1a2420 0%, #0a0f0c 100%);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.7);
  }

  .poster svg{ width: 62%; height: 62%; }

  .poster-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .what-btn{
    position: absolute;
    bottom: -26px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: white;
    border: none;
    font-weight: 800;
    font-size: 1.15rem;
    padding: 14px 38px;
    border-radius: 999px;
    box-shadow: 0 10px 24px -8px rgba(194,42,47,0.7);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .what-btn:active{ transform: translateX(-50%) scale(0.96); background: var(--red-dark); }

  .hint{
    margin: 4px 0 0;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.72);
    text-align: center;
    min-height: 1.2em;
  }

  /* --- reveal card --- */
  .card{
    width: 100%;
    background: var(--paper);
    color: var(--ink);
    border-radius: 18px;
    margin-top: 18px;
    padding: 44px 28px 26px;
    min-height: 210px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 18px 40px -14px rgba(0,0,0,0.55);
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px) scale(0.98);
    transition: opacity 0.28s ease, transform 0.28s ease;
    pointer-events: none;
  }
  .card.visible{
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .card-text{
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.35;
    margin: 0 0 18px;
  }

  .counter{
    font-size: 0.95rem;
    color: rgba(18,20,15,0.55);
    font-weight: 600;
    margin: 0;
  }

  /* --- bottom actions --- */
  .actions{
    width: 100%;
    margin-top: auto;
    padding-top: 34px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .action-btn{
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 18px;
    border-radius: 16px;
    text-decoration: none;
    color: white;
    background: transparent;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
  }

  .action-btn.filled{
    background: #101010;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .action-btn.outline{
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
  }

  .action-icon{
    font-size: 1.3rem;
    flex-shrink: 0;
    width: 22px;
    text-align: center;
  }

  .action-copy{ flex: 1; }
  .action-copy strong{ display: block; font-size: 1.02rem; }
  .action-copy small{ display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 2px; }

  .action-arrow{ opacity: 0.6; font-size: 1.1rem; }

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: white;
    color: var(--ink);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

        <span class="action-icon">📖</span>
        <span class="action-copy">
          <strong>Tap to Level Up as a Citizen</strong>
          <small>Read the Constitution of India</small>
        </span>
        <span class="action-arrow">↗</span>
      </a>

      <button class="action-btn outline" id="shareBtn">
        <span class="action-icon">🔗</span>
        <span class="action-copy">
          <strong>Spread the word</strong>
          <small>Share this with others</small>
        </span>
      </button>

  <div class="toast" id="toast">Link copied</div>

<script>
  const statements = [
    "People are where the power is.",
    "Protest is a right.",
    "You elect people to work for you.",
    "A Constitution which says,\n“हम भारत के लोग.”",
    "Knowing your rights.",
    "Asking for your rights.",
    "Asking for the rights of others who are not as fortunate as you.",
    "A free media — free, in every way.",
    "An independent judiciary.",
    "You."
  ];

  let index = 0;
  let revealed = false;

  const whatBtn = document.getElementById('whatBtn');
  const hint = document.getElementById('hint');
  const card = document.getElementById('card');
  const cardText = document.getElementById('cardText');
  const counter = document.getElementById('counter');
  const shareBtn = document.getElementById('shareBtn');
  const toast = document.getElementById('toast');

  function render(){
    cardText.textContent = statements[index];
    counter.textContent = (index + 1) + ' / ' + statements.length;
  }

  function next(){
    if(!revealed){
      revealed = true;
      render();
      card.classList.add('visible');
      hint.textContent = 'Tap the card for the next one';
    } else {
      index = (index + 1) % statements.length;
      render();
    }
  }

  whatBtn.addEventListener('click', next);
  card.addEventListener('click', next);

  shareBtn.addEventListener('click', async () => {
    const shareData = {
      title: 'Things Which Make a Democracy',
      text: 'People are where the power is. Ten things that make a democracy — and how to show up as a citizen.',
      url: window.location.href
    };
    if(navigator.share){
      try{ await navigator.share(shareData); } catch(e){ /* user cancelled */ }
    } else {
      try{
        await navigator.clipboard.writeText(shareData.url);
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
      } catch(e){
        alert('Copy this link to share:\n' + shareData.url);
      }
    }
  });
</script>
